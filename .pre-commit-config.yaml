repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.4.0
    hooks:
      - id: check-yaml

  - repo: https://github.com/jsickcodes/pre-commit-docx-plain
    rev: 0.4.0
    hooks:
      - id: docxplain
        args:
          - "--header"
          - "This file is autogenerated from {docx}. Do not edit."
          - "--suffix"
          - ".extracted.txt"